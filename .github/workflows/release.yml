name: Release

# Triggered by pushing a tag like "v0.1.0-beta.1" or "v1.0.0".
# Builds the Windows app, packages a portable ZIP and an Inno Setup
# installer, and publishes both as assets on a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version from tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $dest = "Sonora-${{ steps.version.outputs.version }}-windows-portable.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $dest

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ steps.version.outputs.version }}" `
            "installer\sonora.iss"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Sonora ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            Sonora-${{ steps.version.outputs.version }}-windows-portable.zip
            installer/Output/Sonora-Setup-${{ steps.version.outputs.version }}.exe
